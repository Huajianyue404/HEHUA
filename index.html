<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾桶接垃圾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .topBar {
            width: 100%;
            max-width: calc(100vw - 20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            font-size: 18px;
            visibility: hidden;
        }
        .topBar.show {
            visibility: visible;
        }
        .hpBox {
            display: flex;
            gap: 6px;
        }
        .hpBlock {
            width: 24px;
            height: 24px;
            visibility: hidden;
            border: none;
        }
        canvas {
            display: block;
            background: #a1d9ff;
            border: 2px solid #333;
            cursor: pointer;
        }
        /* 移除多余按钮容器，不再用DOM按钮 */
        #btnBox { display: none; }
    </style>
</head>
<body>
    <div class="topBar" id="topBarWrap">
        <div class="hpBox" id="hpContainer">
            <div class="hpBlock"></div>
            <div class="hpBlock"></div>
            <div class="hpBlock"></div>
        </div>
        <div>当前分数：<span id="scoreText">0</span> / 100 分获胜</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="btnBox"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');
        const hpContainer = document.getElementById('hpContainer');
        const topBarWrap = document.getElementById('topBarWrap');
        const btnBox = document.getElementById('btnBox');

        // ========== 全局音频对象 ==========
        const bgmAudio = new Audio("游戏背景音.mp3");
        bgmAudio.loop = true;
        bgmAudio.volume = 0.3;

        const popAudio = new Audio("啵1.mp3");
        popAudio.volume = 0.7;

        const laserAudio = new Audio("魔法激光.mp3");
        laserAudio.volume = 1.0;
        let laserPlayed = false;

        // ========== 全局游戏配置 ==========
        let score = 0;
        const winScore = 100;
        let hp = 3;
        let gameOver = false;
        let isWin = false;
        let isSecretEnd = false;
        let rayDraw = false;
        let secretFreezeTime = 0;
        const secretWaitSecond = 150;
        let rayLineScale = 0;
        let rayParticles = [];
        let enemyAnimFrame = 0;
        const rayColorList = ["#ffdd00", "#ff5522", "#dd22ff", "#22eeff", "#22ff66"];

// 重启游戏函数
function restartGame() {
    score = 0;
    hp = 3;
    gameOver = false;
    isWin = false;
    isSecretEnd = false;
    rayDraw = false;
    secretFreezeTime = 0;
    rayLineScale = 0;
    rayParticles = [];
    trashes = [];
    hugeTrashTimer = 0;
    laserPlayed = false;
    scoreText.innerText = score;
    // 重置敌人
    enemies = [];
    enemies.push(createEnemy());
}
        
        // 结局弹窗按钮区域缓存
        let endBtnRect = null;
        // 三种结局对应链接
        const linkConfig = {
            secret: "https://fteimtih.tipian03.cn/zowb511dn/p5KL?key=t1_7J6GEu&t=1782714457",
            normalWin: "https://4409040.ma3you.cn/html/content_show/index.html?v=20250213&article_id=RPdZM9D#/"
        };

        
        let isStartScreen = true;
        let lightningTimer = 0;
        const lightningInterval = 300;
        let lightningList = [];
        const startBtn = {
            x: 0,
            y: 0,
            w: 260,
            h: 80,
            scale: 1,
            hover: false
        };
        const coverImg = new Image();
        // 新增普通结局互殴图片
        const fightImg = new Image();
        fightImg.src = "两人互殴.jpg";
        
        coverImg.src = "秦始皇丢垃圾.jpg";

        // 画布自适应窗口
        function resizeCanvas() {
            canvas.width = window.innerWidth - 20;
            canvas.height = window.innerHeight - 70;
            player.y = canvas.height - 120;
            startBtn.x = canvas.width / 2 - startBtn.w / 2;
            startBtn.y = canvas.height / 2 + 280;
        }

        const player = {
            w: 300,
            h: 220,
            x: canvas.width / 2 - 75,
            y: canvas.height - 20,
            speed: 8
        };

        let enemies = [];
        let trashes = [];
        let hugeTrashTimer = 0;
        const hugeTrashInterval = 900;

        const imgList = {
            player: new Image(),
            enemy1: new Image(),
            enemy2: new Image(),
            apple: new Image(),
            waterBottle: new Image(),
            cigarette: new Image(),
            fishBone: new Image(),
            hugeBag: new Image()
        };
        imgList.player.src = "玩家暂定.png";
        imgList.enemy1.src = "敌人1.png";
        imgList.enemy2.src = "敌人2.png";
        imgList.apple.src = "苹果.png";
        imgList.waterBottle.src = "水瓶.png";
        imgList.cigarette.src = "烟头.png";
        imgList.fishBone.src = "鱼骨.png";
        imgList.hugeBag.src = "大垃圾袋.png";

        // ========== 鼠标移动监听 ==========
        canvas.addEventListener('mousemove', (e) => {
            if (isStartScreen) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                startBtn.hover = mx >= startBtn.x && mx <= startBtn.x + startBtn.w &&
                                 my >= startBtn.y && my <= startBtn.y + startBtn.h;
                return;
            }
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            player.x = Math.max(0, Math.min(canvas.width - player.w, mouseX - player.w / 2));
        });

   
     canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const clickY = e.clientY - rect.top;

    // 开局界面
    if (isStartScreen && startBtn.hover) {
        isStartScreen = false;
        topBarWrap.classList.add("show");
        bgmAudio.play().catch(()=>{});
        return;
    }

    // 游戏结束弹窗按钮点击检测
    if(gameOver && endBtnRect){
        const {x, y, w, h} = endBtnRect;
        if(clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h){
            if(isWin && isSecretEnd){
                // 完美结局跳转
                window.open(linkConfig.secret, "_blank");
            }else if(isWin){
             
                window.open(linkConfig.normalWin, "_blank");
            }else{
            
                restartGame();
            }
            return;
        }
    }
});

   
        function createLightningPath(startX, startY, endX, endY) {
            const points = [{x: startX, y: startY}];
            let currentX = startX;
            let currentY = startY;
            const segCount = 6 + Math.floor(Math.random() * 4);
            for(let i=0; i<segCount; i++){
                const progress = (i+1)/segCount;
                const targetX = startX + (endX - startX) * progress + (Math.random() - 0.5) * 150;
                const targetY = startY + (endY - startY) * progress;
                currentX = targetX;
                currentY = targetY;
                points.push({x: currentX, y: currentY});
            }
            points.push({x: endX, y: endY});
            return points;
        }
        function spawnLightning() {
            const startX = Math.random() * canvas.width * 0.6 + canvas.width * 0.2;
            const path = createLightningPath(startX, 0, startX + (Math.random()-0.5)*180, canvas.height);
            const sparkParticles = [];
            for(let i=0; i<30; i++){
                const p = path[Math.floor(Math.random()*path.length)];
                sparkParticles.push({
                    x: p.x, y: p.y,
                    vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7,
                    life: 30 + Math.random()*25, size: 2 + Math.random()*4
                })
            }
            lightningList.push({ path, frame: 0, maxFrame: 60, sparks: sparkParticles });
        }
        function updateDrawLightning() {
            lightningTimer++;
            if(lightningTimer >= lightningInterval){
                spawnLightning();
                lightningTimer = 0;
            }
            for(let i = lightningList.length - 1; i >= 0; i--){
                const bolt = lightningList[i];
                bolt.frame++;
                const alpha = 1 - (bolt.frame / bolt.maxFrame);
                if(alpha <= 0){
                    lightningList.splice(i,1);
                    continue;
                }
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = "rgba(180,230,255,0.25)";
                ctx.lineWidth = 40;
                ctx.beginPath();
                ctx.moveTo(bolt.path[0].x, bolt.path[0].y);
                bolt.path.forEach(p=>ctx.lineTo(p.x, p.y));
                ctx.stroke();
                ctx.strokeStyle = "rgba(220,245,255,0.5)";
                ctx.lineWidth =20;
                ctx.beginPath();
                ctx.moveTo(bolt.path[0].x, bolt.path[0].y);
                bolt.path.forEach(p=>ctx.lineTo(p.x, p.y));
                ctx.stroke();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(bolt.path[0].x, bolt.path[0].y);
                bolt.path.forEach(p=>ctx.lineTo(p.x, p.y));
                ctx.stroke();
                for(let s of bolt.sparks){
                    s.x += s.vx; s.y += s.vy; s.life--;
                    const sAlpha = s.life / 50 * alpha;
                    if(sAlpha > 0){
                        ctx.globalAlpha = sAlpha;
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                        ctx.fillStyle = "#b8e8ff";
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
            }
        }
        function drawStartButton() {
            const targetScale = startBtn.hover ? 1.12 : 1;
            startBtn.scale += (targetScale - startBtn.scale) * 0.12;
            const w = startBtn.w * startBtn.scale;
            const h = startBtn.h * startBtn.scale;
            const x = startBtn.x + (startBtn.w - w) / 2;
            const y = startBtn.y + (startBtn.h - h) / 2;
            const grad = ctx.createLinearGradient(x, y, x, y + h);
            grad.addColorStop(0, startBtn.hover ? "#ffdd22" : "#ff9900");
            grad.addColorStop(1, startBtn.hover ? "#ff6600" : "#ff3300");
            ctx.fillStyle = grad;
            ctx.shadowColor = "#ffdd00";
            ctx.shadowBlur = startBtn.hover ? 30 : 15;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 16);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("开始游戏", x + w / 2, y + h / 2);
        }
        function renderStartScreen() {
            endBtnRect = null;
            if (coverImg.complete) {
                ctx.drawImage(coverImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#222";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("加载封面图中...", canvas.width / 2, canvas.height / 2);
            }
            updateDrawLightning();
            drawStartButton();
        }

        function createEnemy() {
            return {
                w: 200, h: 130,
                x: Math.random() * (canvas.width - 105), y: 10,
                shootCd: 0, moveSpeed: 1 + Math.random() * 1.5,
                dir: Math.random() > 0.5 ? 1 : -1
            };
        }
        enemies.push(createEnemy());

        const trashTypes = [
            { img: imgList.apple, w:48, h:54, point:1, speed:2.1 * 0.6 },
            { img: imgList.waterBottle, w:52, h:63, point:2, speed:2.66 * 0.6 },
            { img: imgList.cigarette, w:57, h:27, point:1, speed:2.24 * 0.6 },
            { img: imgList.fishBone, w:60, h:45, point:3, speed:3.15 * 0.6 }
        ];
        const hugeTrashType = { img: imgList.hugeBag, w:105, h:105, point:8, speed:4.9 * 0.6, isHuge:true };
        function createNormalTrash(enemy) {
            const t = trashTypes[Math.floor(Math.random() * trashTypes.length)];
            return { x: enemy.x + enemy.w / 2 - t.w / 2, y: enemy.y + enemy.h, ...t, isHuge: false };
        }
        function createHugeTrash(enemy) {
            const t = hugeTrashType;
            return { x: enemy.x + enemy.w / 2 - t.w / 2, y: enemy.y + enemy.h, ...t };
        }
        function isCollide(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function drawHeartHP() {
            const startX = 10;
            const y = 22;
            const heartSize = 22;
            for(let i=0; i<3; i++){
                const cx = startX + i * (heartSize + 8);
                ctx.beginPath();
                ctx.moveTo(cx, y + heartSize / 4);
                ctx.bezierCurveTo(cx - heartSize/2, y - heartSize/3, cx - heartSize/2, y + heartSize/2, cx, y + heartSize);
                ctx.bezierCurveTo(cx + heartSize/2, y + heartSize/2, cx + heartSize/2, y - heartSize/3, cx, y + heartSize/4);
                ctx.fillStyle = i < hp ? "#e63946" : "#cccccc";
                ctx.fill();
                ctx.strokeStyle="#000";
                ctx.lineWidth=1;
                ctx.stroke();
            }
        }

        function spawnRayParticles(startX, startY, endX, endY) {
            for(let i=0; i<40; i++){
                const t = Math.random();
                const px = startX + (endX - startX) * t;
                const py = startY + (endY - startY) * t;
                rayParticles.push({x: px, y: py, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 60 + Math.random()*30, size: 2 + Math.random()*6, color: rayColorList[Math.floor(Math.random() * rayColorList.length)], type: "star"})
            }
            for(let i=0; i<20; i++){
                const t = Math.random();
                const px = startX + (endX - startX) * t;
                const py = startY + (endY - startY) * t;
                rayParticles.push({x: px, y: py, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 80 + Math.random()*40, size: 1, color: rayColorList[Math.floor(Math.random() * rayColorList.length)], type: "line", oldX: px, oldY: py})
            }
            for(let i=0; i<10; i++){
                const t = Math.random();
                const px = startX + (endX - startX) * t;
                const py = startY + (endY - startY) * t;
                rayParticles.push({x: px, y: py, vx: (Math.random()-0.5)*14, vy: (Math.random()-0.5)*14, life: 40, size: 4 + Math.random()*8, color: rayColorList[Math.floor(Math.random() * rayColorList.length)], type: "big"})
            }
        }
        function updateDrawParticles(){
            for(let i = rayParticles.length -1; i >=0; i--){
                const p = rayParticles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                const alpha = p.life / 100;
                if(p.life <=0){ rayParticles.splice(i,1); continue; }
                ctx.globalAlpha = alpha;
                if(p.type === "star" || p.type === "big"){
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fillStyle = p.color; ctx.fill();
                }else if(p.type === "line"){
                    ctx.beginPath(); ctx.moveTo(p.oldX, p.oldY); ctx.lineTo(p.x, p.y); ctx.strokeStyle = p.color; ctx.lineWidth = p.size; ctx.stroke();
                    p.oldX = p.x; p.oldY = p.y;
                }
                ctx.globalAlpha = 1;
            }
        }
        function drawKillRay(playerCX, playerCY, enemyCX, enemyCY) {
            ctx.strokeStyle="rgba(200,50,255,0.25)"; ctx.lineWidth=24 * rayLineScale; ctx.beginPath(); ctx.moveTo(playerCX, playerCY); ctx.lineTo(enemyCX, enemyCY); ctx.stroke();
            ctx.strokeStyle="rgba(255,90,30,0.45)"; ctx.lineWidth=14 * rayLineScale; ctx.beginPath(); ctx.moveTo(playerCX, playerCY); ctx.lineTo(enemyCX, enemyCY); ctx.stroke();
            ctx.strokeStyle="#ffdd00"; ctx.lineWidth=6 * rayLineScale; ctx.beginPath(); ctx.moveTo(playerCX, playerCY); ctx.lineTo(enemyCX, enemyCY); ctx.stroke();
        }

        // 文字自动换行工具函数
        function drawWrapText(text, x, y, maxW, lineH) {
            ctx.textAlign = "left";
            const words = text.split("");
            let line = "";
            let drawY = y;
            for (let i = 0; i < words.length; i++) {
                const testLine = line + words[i];
                const w = ctx.measureText(testLine).width;
                if (w > maxW && line !== "") {
                    ctx.fillText(line, x, drawY);
                    line = words[i];
                    drawY += lineH;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, drawY);
            return drawY + lineH;
        }

        // 游戏主画面渲染
        function renderGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawHeartHP();

            let enemyImg = enemyAnimFrame % 16 < 8 ? imgList.enemy1 : imgList.enemy2;
            enemies.forEach(e => {
                if(enemyImg.complete) ctx.drawImage(enemyImg, e.x, e.y, e.w, e.h);
                else { ctx.fillStyle = '#c82423'; ctx.fillRect(e.x, e.y, e.w, e.h); }
            });
            trashes.forEach(t => { if(t.img.complete) ctx.drawImage(t.img, t.x, t.y, t.w, t.h); });
            if(imgList.player.complete) ctx.drawImage(imgList.player, player.x, player.y, player.w, player.h);
            else { ctx.fillStyle = '#444444'; ctx.fillRect(player.x, player.y, player.w, player.h); ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.strokeRect(player.x, player.y, player.w, player.h); }

            if(rayDraw){
                const pCX = player.x + player.w/2;
                const pCY = player.y;
                const eCX = enemies[0].x + enemies[0].w/2;
                const eCY = enemies[0].y + enemies[0].h/2;
                drawKillRay(pCX, pCY, eCX, eCY);
                updateDrawParticles();
            }

            // 游戏结束弹窗绘制
            if(gameOver){
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                const boxW = 620;
                const boxH = 360;
                const boxX = canvas.width/2 - boxW/2;
                const boxY = canvas.height/2 - boxH/2;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(boxX, boxY, boxW, boxH);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.strokeRect(boxX, boxY, boxW, boxH);
                ctx.fillStyle = '#222';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = "top";

                // 按钮画布坐标，上移消除删除得分后的空白
                const btnW = 340;
                const btnH = 70;
                const btnX = boxX + (boxW - btnW) / 2;
                const btnY = boxY + boxH - 70;
                endBtnRect = {x: btnX, y: btnY, w: btnW, h: btnH};

                let gradBtn;
                let btnText;

                if(isWin && isSecretEnd){
                    // ===== 隐藏完美结局 =====
                    gradBtn = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                    gradBtn.addColorStop(0, "#ffdd22");
                    gradBtn.addColorStop(1, "#ff6600");
                    btnText = "继续";
                    ctx.fillText('隐藏结局 · 完美通关', canvas.width/2, boxY + 20);
                    
                    ctx.font = '40px sans-serif';
                    ctx.textAlign = "left";
                    ctx.fillStyle = "#222";
                    const secretText = "躲开冲动的拳头实在是太容易了。在防卫的同时，你还不断劝告着这个年轻人不应该乱丢垃圾。不知道过了多久，又或是哪句话触动了他，他终于愿意停下来听你说话...";
                    drawWrapText(secretText, boxX + 30, boxY + 70, boxW - 60, 26);

                }else if(isWin){
                    // ===== 普通胜利结局 =====
                    gradBtn = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                    gradBtn.addColorStop(0, "#34d399");
                    gradBtn.addColorStop(1, "#059669");
                    btnText = "继续";
                    ctx.fillText('游戏胜利', canvas.width/2, boxY + 20);

                    // 左侧绘制互殴图片
                    const imgW = 260;
                    const imgH = 180;
                    const imgX = boxX + 20;
                    const imgY = boxY + 70;
                    if(fightImg.complete){
                        ctx.drawImage(fightImg, imgX, imgY, imgW, imgH);
                    }else{
                        // 图片未加载占位
                        ctx.fillStyle="#888";
                        ctx.fillRect(imgX, imgY, imgW, imgH);
                        ctx.fillStyle="#fff";
                        ctx.font="16px sans-serif";
                        ctx.textAlign="center";
                        ctx.fillText("两人互殴.png", imgX + imgW/2, imgY + imgH/2);
                    }

                    // 右侧剧情文字，自动换行
                    ctx.font = '40px sans-serif';
                    ctx.textAlign = "left";
                    ctx.fillStyle = "#222";
                    const fightText = "你们打得难解难分，不相上下，拳头相撞的闷响成功吸引了一大片的路人...以及警察。";
                    drawWrapText(fightText, imgX + imgW + 20, imgY + 10, boxW - imgW - 60, 24);

                }else{
                    // ===== 失败结局 =====
                    gradBtn = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                    gradBtn.addColorStop(0, "#f87171");
                    gradBtn.addColorStop(1, "#dc2626");
                    btnText = "重新挑战";
                    ctx.fillText('游戏失败', canvas.width/2, boxY + 30);
                    ctx.font = '24px sans-serif';
                    ctx.fillText(`得分：${score}，血量耗尽`, canvas.width/2, boxY + 120);
                }

                // 绘制画布按钮，字号30，文字居中不偏下
                ctx.fillStyle = gradBtn;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, 16);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(btnText, btnX + btnW/2, btnY + btnH/2 + 0);
            }else{
                endBtnRect = null;
            }
        }

        function updateGame() {
            if (gameOver) return;
            enemyAnimFrame++;
            if(rayDraw){
                if(!laserPlayed){
                    laserAudio.currentTime = 0;
                    laserAudio.play().catch(()=>{});
                    laserPlayed = true;
                }
                secretFreezeTime++;
                const progress = secretFreezeTime / secretWaitSecond;
                rayLineScale = progress < 0.5 ? progress * 3 : (1 - progress) * 3;
                const pCX = player.x + player.w/2;
                const pCY = player.y;
                const eCX = enemies[0].x + enemies[0].w/2;
                const eCY = enemies[0].y + enemies[0].h/2;
                if(secretFreezeTime % 4 === 0){
                    spawnRayParticles(pCX,pCY,eCX,eCY);
                }
                if(secretFreezeTime >= secretWaitSecond){
                    gameOver = true;
                    isWin = true;
                    isSecretEnd = true;
                }
                return;
            }

            hugeTrashTimer++;
            enemies.forEach(enemy => {
                enemy.x += enemy.moveSpeed * enemy.dir;
                if(enemy.x <= 0 || enemy.x + enemy.w >= canvas.width) enemy.dir *= -1;
                if(Math.random() < 0.008) enemy.dir *= -1;
                enemy.shootCd--;
                if (enemy.shootCd <= 0) {
                    trashes.push(createNormalTrash(enemy));
                    enemy.shootCd = 30 + Math.random() * 25;
                }
                if(hugeTrashTimer >= hugeTrashInterval){
                    trashes.push(createHugeTrash(enemy));
                    hugeTrashTimer = 0;
                }
            });

            for (let i = trashes.length - 1; i >= 0; i--) {
                const t = trashes[i];
                t.y += t.speed;
                if (isCollide(t, player)) {
                    score += t.point;
                    scoreText.innerText = score;
                    trashes.splice(i, 1);
                    if (score >= winScore) {
                        if(hp === 3){
                            rayDraw = true;
                            secretFreezeTime = 0;
                            rayParticles = [];
                            laserPlayed = false;
                        }else{
                            gameOver = true;
                            isWin = true;
                            isSecretEnd = false;
                        }
                    }
                    continue;
                }
                if (t.y > canvas.height) {
                    popAudio.currentTime = 0;
                    popAudio.play().catch(()=>{});
                    hp -= t.isHuge ? 2 : 1;
                    trashes.splice(i, 1);
                    if(hp <= 0){
                        gameOver = true;
                        isWin = false;
                    }
                }
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        function gameLoop() {
            if(isStartScreen){
                renderStartScreen();
            }else{
                updateGame();
                renderGame();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
